<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PoE2 Hub — El Regreso de los Antiguos</title>
  <meta name="description" content="Centro personal de Path of Exile 2. Notas del parche 0.5.0, herramientas útiles, enlaces de comercio y recursos." />
  <meta property="og:title" content="PoE2 Hub — El Regreso de los Antiguos" />
  <meta property="og:description" content="Sitio de referencia personal de Path of Exile 2 para el parche 0.5.0." />
  <meta property="og:image" content="/assets/og-image.png" />
  <link rel="icon" href="/assets/favicon.ico" />

  <!-- Cabinet Grotesk via Fontshare -->
  <link href="https://api.fontshare.com/v2/css?f[]=cabinet-grotesk@400,500,700,800&display=swap" rel="stylesheet" />

  <!-- Inter via Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300..700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <a href="#main-content" class="skip-link">Skip to content</a>

  <!-- Mobile sidebar toggle -->
  <button class="sidebar-toggle" aria-label="Open sidebar" aria-expanded="false" aria-controls="sidebar">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
      <line x1="3" y1="6" x2="21" y2="6"/>
      <line x1="3" y1="12" x2="21" y2="12"/>
      <line x1="3" y1="18" x2="21" y2="18"/>
    </svg>
  </button>

  <div class="site-wrapper">

    <!-- ═══════════════════════════════
         LEFT SIDEBAR — PoE2 Tools & Links
         ═══════════════════════════════ -->
    <aside id="sidebar" class="sidebar" aria-label="PoE2 tools and resources">

      <div class="sidebar-header">
        <a href="/" class="site-logo" aria-label="PoE2 Hub home">
          <svg width="28" height="28" viewBox="0 0 28 28" fill="none" aria-hidden="true">
            <rect width="28" height="28" rx="4" fill="var(--color-primary)"/>
            <text x="14" y="19" text-anchor="middle" font-size="14"
                  font-family="var(--font-display)" font-weight="800" fill="white">P2</text>
          </svg>
          <span class="site-name">PoE2 Hub</span>
        </a>
        <button class="theme-toggle" data-theme-toggle aria-label="Switch to light mode">
          <!-- Moon icon (dark mode active) -->
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
          </svg>
        </button>
      </div>

      <nav class="sidebar-nav" aria-label="PoE2 resources navigation">
        <!-- Barra lateral vacía, sin enlaces por ahora -->
      </nav>
    </aside>

    <div class="sidebar-backdrop" aria-hidden="true"></div>

    <!-- ═══════════════════════════════
         MAIN CONTENT — Objeto BIS
         ═══════════════════════════════ -->
    <main id="main-content" class="main-content">
      <section class="content-block" aria-labelledby="bis-title">
        <h2 id="bis-title" class="block-title">🧾 Objeto BIS</h2>
        <div class="block-body">
          <p>Agrega URLs de objetos de <strong>poe2db.tw</strong>. El último segmento de la URL identifica el objeto que se almacenará en la tabla siguiente.</p>
          <form id="bis-object-form" class="bis-form">
            <label for="bis-object-url" class="bis-label">URL del objeto</label>
            <div class="bis-input-row">
              <input id="bis-object-url" type="url" placeholder="https://poe2db.tw/us/Death_Rush" required autocomplete="off" />
              <button type="submit" class="bis-submit">Agregar objeto</button>
            </div>
          </form>
          <p id="bis-object-message" class="bis-message" aria-live="polite"></p>
        </div>
        <div class="bis-table-wrapper">
          <table class="bis-table">
            <thead>
              <tr>
                <th>Objeto</th>
                <th>Acciones</th>
              </tr>
            </thead>
            <tbody id="bis-object-list"></tbody>
          </table>
        </div>
      </section>
    </main>
  </div>

  <script src="main.js" defer></script>
</body>
</html>
